<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJM00의 포트폴리오 웹사이트</title>
    <meta name="description" content="저의 기술을 보여드죠" />
<meta property="og:title" content="PJM00의 포트폴리오 웹사이트" />
<meta property="og:description" content="저의 기술을 보여드죠 진짜로 진심으로" />
<meta property="og:url" content="https://pjmoo.github.io/260518_ex" />
<meta property="og:image" content="https://pjmoo.github.io/260518_ex/og_preview.png" />


    <link rel="icon" type="image/png" href="./favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="shortcut icon" href="./favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hi+Melody&display=swap" rel="stylesheet">
    
    <style>
        h1 {
            font-size: 100px;
            font-family: "Hi Melody", sans-serif;
        }
         p {
            color: gray;
        }
        .class-style {
            color: green;
        }
        .class-style2 {
            font-size: 50px;
            text-align: center;
            color: #F891BB;
        }
        .class-style3 {
            color: blue;
        }
        #id-style {
            color: yellow;
        }
    </style>
</head>
<body>
    <h1>저는 박정민입니다</h1>
    <p>저는 취업을 희망합니다 진짜로 진심으로</p>
    <p class="class-style2">저는 <strong>행복</strong>합니다</p>
     <form action="#" method="GET">
        
      
        <label for="user_id">아이디:</label>
       
        <input type="text" id="user_id" name="userId" placeholder="아이디를 입력하세요">
        <br><br>

        <label for="user_pw">비밀번호:</label>
        <input type="password" id="user_pw" name="userPw">
        <br><br>

        <label for="user_intro">자기소개:</label>
        <textarea id="user_intro" name="userIntro" rows="3" cols="30"></textarea>
        <br><br>

        성별: 
        <input type="radio" id="male" name="gender" value="m"> <label for="male">남성</label>
        <input type="radio" id="female" name="gender" value="f"> <label for="female">여성</label>
        <br><br>

        관심 분야:
        <input type="checkbox" id="coding" name="hobby" value="code"> <label for="coding">코딩</label>
        <input type="checkbox" id="music" name="hobby" value="music"> <label for="music">음악</label>
        <input type="checkbox" id="sports" name="hobby" value="sports"> <label for="sports">운동</label>
        <br><br>

        <label for="region">거주 지역:</label>
        <select id="region" name="userRegion">
            <option value="seoul">서울</option>
            <option value="wolsan">울산</option>
            <option value="dejun">대전</option>
            <option value="gwagju">광주</option>
            <option value="incheon">인천</option>
            <option value="busan">부산</option>
            <option value="daegu">대구</option>
            <option value="jeju">제주</option>
        </select>
        <br><br>

        <button type="submit">가입하기 (데이터 전송)</button>
        <button type="reset">초기화</button>
</body>
</html>
