<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 선택자</title>
    <style>
        p {
            color: gray;
        }
        .class-style {
            color: green;
        }
        .class-style2 {
            color: red;
        }
        .class-style3 {
            color: blue;
        }
        #id-style {
            color: yellow;
        }
    </style>
</head>
<body>
    <p>태그 선택자</p>
    <p class="class-style">클래스 선택자</p>
    <p class="class-style2">클래스 선택자</p>
    <p class="class-style3">클래스 선택자</p>
    <p id="id-style" class="class-style3">아이디 선택자</p>
    
</body>
</html>
